services:
  postgres:
    image: postgres:17-alpine
    container_name: aimmod-hub-postgres
    environment:
      POSTGRES_DB: aimmod_hub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - aimmod_hub_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aimmod_hub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  aimmod_hub_postgres:
