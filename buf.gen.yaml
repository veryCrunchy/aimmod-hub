version: v2

plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/connectrpc/go
    out: gen/go
    opt:
      - paths=source_relative
  - remote: buf.build/bufbuild/es:v1.10.0
    out: web/src/gen
    opt:
      - target=ts
  - remote: buf.build/connectrpc/es:v1.6.1
    out: web/src/gen
    opt:
      - target=ts
